{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Listing — Again &amp; Again{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white fw-semibold">
        <i class="bi bi-exclamation-triangle me-1"></i>Confirm Delete
      </div>
      <div class="card-body text-center py-4">

        <i class="bi bi-trash text-danger" style="font-size: 3rem;"></i>

        <h4 class="mt-3 mb-2">Are you sure?</h4>
        <p class="text-muted mb-1">You are about to permanently delete:</p>
        <p class="fw-bold fs-5 mb-4">&ldquo;{{ item.itemName }}&rdquo;</p>
        <p class="text-danger small mb-4">This action cannot be undone.</p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <a href="{% url 'marketplace:item_detail' item.pk %}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Cancel
            </a>
            <button type="submit" class="btn btn-danger fw-semibold">
              <i class="bi bi-trash me-1"></i>Yes, Delete
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
