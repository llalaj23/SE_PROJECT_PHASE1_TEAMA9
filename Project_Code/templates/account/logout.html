{% extends "base.html" %}

{% block title %}Log Out — Again &amp; Again{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4 text-center">
    <i class="bi bi-box-arrow-right text-dark" style="font-size:3rem;"></i>
    <h3 class="mt-3">Log out of Again &amp; Again?</h3>
    {% if user.is_authenticated %}
      <p class="text-muted">Signed in as <strong>{{ user.email }}</strong></p>
    {% endif %}
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-lg mt-2">
        <i class="bi bi-box-arrow-right me-1"></i>Yes, Log Out
      </button>
    </form>
    <a href="{% url 'marketplace:home' %}" class="btn btn-outline-secondary btn-lg mt-2 ms-2">
      Cancel
    </a>
  </div>
</div>
{% endblock %}
